<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentWheel - Create an Account</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;">

    <div style="display: flex; align-items: center; margin-bottom: 30px;">
        <div style="background-color: #f7a80d; border-radius: 10px; padding: 10px; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center;">
            <svg style="width: 24px; height: 24px; fill: white;" viewBox="0 0 24 24">
                <path d="M18.92,10.01C18.68,8.83 17.65,8 16.39,8H7.61C6.35,8 5.32,8.83 5.08,10.01L3.1,19.34C2.93,20.25 3.61,21 4.5,21H19.5C20.39,21 21.07,20.25 20.9,19.34L18.92,10.01M6.5,12A1.5,1.5 0 0,1 8,13.5A1.5,1.5 0 0,1 6.5,15A1.5,1.5 0 0,1 5,13.5A1.5,1.5 0 0,1 6.5,12M17.5,12A1.5,1.5 0 0,1 19,13.5A1.5,1.5 0 0,1 17.5,15A1.5,1.5 0 0,1 16,13.5A1.5,1.5 0 0,1 17.5,12M6,17H18V19H6V17Z" />
            </svg>
        </div>
        <h1 style="color: #f7a80d; font-size: 32px; font-weight: bold; margin: 0 0 0 10px;">RentWheel</h1>
    </div>

    <div style="background-color: #fff; width: 90%; max-width: 1000px; border-radius: 20px; display: flex; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden;">
        
        <div style="background-color: #121212; color: #fff; padding: 60px 50px; width: 45%; flex-shrink: 0;">
            <h2 style="font-size: 36px; font-weight: bold; margin: 0 0 20px 0; color: #f7a80d;">Your Journey Starts Here</h2>
            <p style="font-size: 16px; color: #b0b0b0; line-height: 1.6; margin-bottom: 40px;">Access thousands of premium vehicles across Nepal. Cars, bikes, trucks - all at your fingertips.</p>
            
            <div style="display: flex; gap: 20px;">
                <div style="background-color: #2a2a2a; padding: 20px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; width: 100px;">
                    <svg style="width: 48px; height: 48px; fill: #f7a80d; margin-bottom: 10px;" viewBox="0 0 24 24">
                        <path d="M18.92,10.01C18.68,8.83 17.65,8 16.39,8H7.61C6.35,8 5.32,8.83 5.08,10.01L3.1,19.34C2.93,20.25 3.61,21 4.5,21H19.5C20.39,21 21.07,20.25 20.9,19.34L18.92,10.01M6.5,12A1.5,1.5 0 0,1 8,13.5A1.5,1.5 0 0,1 6.5,15A1.5,1.5 0 0,1 5,13.5A1.5,1.5 0 0,1 6.5,12M17.5,12A1.5,1.5 0 0,1 19,13.5A1.5,1.5 0 0,1 17.5,15A1.5,1.5 0 0,1 16,13.5A1.5,1.5 0 0,1 17.5,12M6,17H18V19H6V17Z" />
                    </svg>
                    <span style="font-size: 14px; color: #fff;">Cars</span>
                </div>
                <div style="background-color: #2a2a2a; padding: 20px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; width: 100px;">
                    <svg style="width: 48px; height: 48px; fill: #f7a80d; margin-bottom: 10px;" viewBox="0 0 24 24">
                        <path d="M15.5 5.5C15.5 6.88 14.38 8 13 8C11.62 8 10.5 6.88 10.5 5.5C10.5 4.12 11.62 3 13 3C14.38 3 15.5 4.12 15.5 5.5M19 12V10C17.34 10 16 8.66 16 7H14C14 8.66 12.66 10 11 10V12H13.5V17H16V12H19M7.5 15.5A2 2 0 0,1 5.5 17.5A2 2 0 0,1 3.5 15.5A2 2 0 0,1 5.5 13.5A2 2 0 0,1 7.5 15.5M19.5 15.5A2 2 0 0,1 17.5 17.5A2 2 0 0,1 15.5 15.5A2 2 0 0,1 17.5 13.5A2 2 0 0,1 19.5 15.5Z" />
                    </svg>
                    <span style="font-size: 14px; color: #fff;">Bikes</span>
                </div>
                <div style="background-color: #2a2a2a; padding: 20px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; width: 100px;">
                    <svg style="width: 48px; height: 48px; fill: #f7a80d; margin-bottom: 10px;" viewBox="0 0 24 24">
                        <path d="M20,8H17V4H3C1.89,4 1,4.89 1,6V17H3A3,3 0 0,0 6,20A3,3 0 0,0 9,17H15A3,3 0 0,0 18,20A3,3 0 0,0 21,17H23V12L20,8M6,18.5A1.5,1.5 0 0,1 4.5,17A1.5,1.5 0 0,1 6,15.5A1.5,1.5 0 0,1 7.5,17A1.5,1.5 0 0,1 6,18.5M18,18.5A1.5,1.5 0 0,1 16.5,17A1.5,1.5 0 0,1 18,15.5A1.5,1.5 0 0,1 19.5,17A1.5,1.5 0 0,1 18,18.5M17,12V10H19.5L21.47,12H17Z" />
                    </svg>
                    <span style="font-size: 14px; color: #fff;">Trucks</span>
                </div>
            </div>
        </div>

        <div style="padding: 60px 50px; width: 55%;">
            <h2 style="font-size: 32px; font-weight: bold; margin: 0 0 10px 0;">Create an Account</h2>
            <p style="font-size: 16px; color: #666; margin-bottom: 30px;">Join RentWheel and start renting today</p>
            
            <form>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 14px; color: #666; margin-bottom: 8px;">Full Name</label>
                    <input type="text" placeholder="Enter your full name" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; box-sizing: border-box;">
                </div>
                
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 14px; color: #666; margin-bottom: 8px;">Email</label>
                    <input type="email" placeholder="example@email.com" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; box-sizing: border-box;">
                </div>
                
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 14px; color: #666; margin-bottom: 8px;">Password</label>
                    <div style="position: relative;">
                        <input type="password" placeholder="Create a strong password" style="width: 100%; padding: 12px 40px 12px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; box-sizing: border-box;">
                        <svg style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; fill: #666;" viewBox="0 0 24 24">
                            <path d="M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9M12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17M12,4.5C7,4.5 2.73,7.61 1,12C2.73,16.39 7,19.5 12,19.5C17,19.5 21.27,16.39 23,12C21.27,7.61 17,4.5 12,4.5Z" />
                        </svg>
                    </div>
                </div>
                
                <div style="margin-bottom: 25px;">
                    <label style="display: block; font-size: 14px; color: #666; margin-bottom: 8px;">Confirm Password</label>
                    <div style="position: relative;">
                        <input type="password" placeholder="Re-enter your password" style="width: 100%; padding: 12px 40px 12px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; box-sizing: border-box;">
                        <svg style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; fill: #666;" viewBox="0 0 24 24">
                            <path d="M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9M12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17M12,4.5C7,4.5 2.73,7.61 1,12C2.73,16.39 7,19.5 12,19.5C17,19.5 21.27,16.39 23,12C21.27,7.61 17,4.5 12,4.5Z" />
                        </svg>
                    </div>
                </div>
                
                <div style="display: flex; align-items: center; margin-bottom: 30px;">
                    <input type="checkbox" style="margin-right: 10px;">
                    <span style="font-size: 14px; color: #666;">I agree to the <a href="#" style="color: #f7a80d; text-decoration: none;">Terms of Service</a> and <a href="#" style="color: #f7a80d; text-decoration: none;">Privacy Policy</a></span>
                </div>
                
                <button type="submit" style="width: 100%; padding: 14px; background-color: #f7a80d; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 20px;">Sign Up</button>
            </form>
            
            <p style="text-align: center; font-size: 14px; color: #666; margin: 0;">Already have an account? <a href="#" style="color: #f7a80d; text-decoration: none; font-weight: bold;">Sign In</a></p>
        </div>
    </div>

</body>
</html>
